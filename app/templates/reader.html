<!DOCTYPE html>
<html lang="hr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BooklyTTS Reader</title>
    <link rel="stylesheet" href="/static/css/style.css?v=10">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:#0d1117;color:#e6edf3;height:100vh;display:flex;flex-direction:column}
        .header{display:flex;align-items:center;justify-content:space-between;padding:8px 16px;background:#161b22;border-bottom:1px solid #21262d;min-height:48px;z-index:100}
        .header a,.header button{color:#8b949e;text-decoration:none;background:none;border:none;cursor:pointer;font-size:1.1em;padding:4px 8px}
        .header a:hover,.header button:hover{color:white}
        .logo{color:#7b68ee!important;font-weight:bold;font-size:1em!important}
        
        .upload-row{display:flex;gap:8px;padding:8px 16px;background:#0d1117;border-bottom:1px solid #21262d;align-items:center}
        .upload-row input[type=file]{flex:1;padding:6px 10px;background:#21262d;border:1px solid #30363d;border-radius:6px;color:#c9d1d9;font-size:0.85em}
        .upload-row button{padding:6px 14px;background:#238636;color:white;border:none;border-radius:6px;cursor:pointer;font-size:0.85em;white-space:nowrap}
        .upload-row button:hover{background:#2ea043}
        .upload-status{font-size:0.8em;color:#8b949e}
        
        .main{display:flex;flex:1;overflow:hidden}
        
        .sidebar{width:260px;background:#0d1117;border-right:1px solid #21262d;display:flex;flex-direction:column;overflow:hidden}
        .sidebar-header{padding:12px;border-bottom:1px solid #21262d}
        .sidebar-header h3{font-size:0.85em;color:#7b68ee;margin-bottom:8px}
        .sidebar-header input{width:100%;padding:6px 10px;background:#21262d;border:1px solid #30363d;border-radius:6px;color:white;font-size:0.85em}
        .chapter-list{flex:1;overflow-y:auto}
        .chapter-item{padding:8px 12px;cursor:pointer;font-size:0.85em;color:#8b949e;border-left:3px solid transparent;transition:all 0.15s}
        .chapter-item:hover{background:rgba(255,255,255,0.03);color:white}
        .chapter-item.active{border-left-color:#7b68ee;color:white;background:rgba(123,104,238,0.1)}
        
        .reader{flex:1;display:flex;flex-direction:column;overflow:hidden}
        .reader-toolbar{display:flex;gap:8px;align-items:center;padding:6px 16px;background:#161b22;border-bottom:1px solid #21262d}
        .reader-toolbar button,.reader-toolbar select{background:#21262d;border:1px solid #30363d;color:#c9d1d9;padding:4px 10px;border-radius:4px;cursor:pointer;font-size:0.8em}
        .reader-content{flex:1;overflow-y:auto;padding:24px 32px;font-size:16px;line-height:1.8}
        .reader-content h2{color:#7b68ee;margin:16px 0 8px}
        .reader-content p{margin:8px 0}
        .welcome{text-align:center;padding:60px 20px}
        .welcome h2{margin-bottom:12px}
        .progress-text{margin-left:auto;font-size:0.8em;color:#555}
        
        .tts-bar{position:fixed;bottom:0;left:0;right:0;background:#161b22;border-top:2px solid #7b68ee;z-index:200;padding:10px 16px;box-shadow:0 -4px 20px rgba(0,0,0,0.6)}
        .tts-bar-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
        .tts-bar-header span{font-weight:bold;color:#7b68ee;font-size:0.9em}
        .tts-bar-close{background:none;border:none;color:#f85149;cursor:pointer;font-size:1em;padding:2px 8px}
        .tts-controls{display:flex;gap:6px;align-items:center;flex-wrap:wrap;margin-bottom:6px}
        .tts-controls select{padding:5px 8px;background:#21262d;color:white;border:1px solid #30363d;border-radius:4px;font-size:0.8em}
        .tts-controls input[type=range]{width:60px}
        .tts-controls span{font-size:0.75em;color:#8b949e;white-space:nowrap}
        .tts-actions{display:flex;gap:4px;flex-wrap:wrap}
        .tts-actions button{padding:5px 12px;border-radius:4px;border:none;cursor:pointer;font-size:0.8em}
        .btn-play{background:#238636;color:white}
        .btn-pause{background:#21262d;color:#c9d1d9;border:1px solid #30363d}
        .btn-stop{background:#da3633;color:white}
        .btn-nav{background:#21262d;color:#c9d1d9;border:1px solid #30363d}
        .tts-status-text{font-size:0.75em;color:#8b949e;margin-top:4px}
        
        .search-box{margin-top:8px;display:flex;gap:4px}
        .search-box input{flex:1;padding:4px 8px;background:#21262d;border:1px solid #30363d;border-radius:4px;color:white;font-size:0.8em}
        .search-box button{padding:4px 10px;background:#21262d;color:#c9d1d9;border:1px solid #30363d;border-radius:4px;cursor:pointer;font-size:0.8em}
        .search-result{font-size:0.75em;color:#8b949e;margin-top:2px}
        
        @media(max-width:600px){
            .sidebar{display:none}
            .reader-content{padding:16px}
        }
    </style>
</head>
<body>
    <div class="header">
        <div><a href="/" class="logo">📚 BooklyTTS</a></div>
        <div id="book-title" style="font-size:0.9em;color:#8b949e;">Reader</div>
        <div>
            <a href="/rules" title="Pravila izgovora">🔧</a>
            <a href="/convert" title="Konverter">💾</a>
            <button onclick="toggleTTS()" title="TTS Kontrola">🎧</button>
        </div>
    </div>
    
    <div class="upload-row">
        <input type="file" id="epub-file" accept=".epub">
        <button onclick="document.getElementById('epub-file').click()">📤 Upload EPUB</button>
        <span class="upload-status" id="upload-status"></span>
    </div>
    
    <div class="main">
        <div class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <h3>📑 Poglavlja</h3>
                <input type="text" id="chapter-search" placeholder="🔍 Filtriraj..." oninput="filterChapters()">
            </div>
            <div class="chapter-list" id="chapter-list">
                <div class="chapter-item" style="color:#555;">Uploaduj EPUB</div>
            </div>
        </div>
        
        <div class="reader">
            <div class="reader-toolbar">
                <button onclick="toggleSidebar()">📑</button>
                <select id="font-size" onchange="changeFontSize(this.value)">
                    <option value="14">14px</option><option value="16" selected>16px</option>
                    <option value="18">18px</option><option value="20">20px</option><option value="24">24px</option>
                </select>
                <button onclick="toggleTheme()">🌓</button>
                <span class="progress-text" id="progress-text">-</span>
            </div>
            <div class="reader-content" id="reader-content">
                <div class="welcome">
                    <h2>📚 BooklyTTS Reader</h2>
                    <p>Uploaduj EPUB fajl za početak čitanja</p>
                </div>
            </div>
        </div>
    </div>
    
    <!-- TTS BAR -->
    <div class="tts-bar" id="tts-bar" style="display:none;">
        <div class="tts-bar-header">
            <span>🎧 TTS Kontrola</span>
            <button class="tts-bar-close" onclick="toggleTTS()">✕ Zatvori</button>
        </div>
        
        <!-- Pretraga rečenice -->
        <div class="search-box">
            <input type="text" id="sentence-search" placeholder="🔍 Unesi rečenicu za traženje...">
            <button onclick="searchSentence()">Traži</button>
            <span class="search-result" id="search-result"></span>
        </div>
        
        <div class="tts-controls">
            <select id="tts-voice">
                <option value="hr-HR-GabrijelaNeural" selected>Gabrijela (HR ž)</option>
                <option value="hr-HR-SreckoNeural">Srecko (HR m)</option>
                <option value="bs-BA-VesnaNeural">Vesna (BS ž)</option>
                <option value="bs-BA-GoranNeural">Goran (BS m)</option>
            </select>
            <span>⚡ <span id="rate-val">1.0x</span></span>
            <input type="range" id="rate-slider" min="0.5" max="2.0" step="0.1" value="1.0" oninput="updateRate(this.value)">
        </div>
        
        <div class="tts-actions">
            <button class="btn-play" id="btn-play" onclick="ttsPlay()">▶️ Play</button>
            <button class="btn-pause" id="btn-pause" onclick="ttsPause()" style="display:none;">⏸️ Pauza</button>
            <button class="btn-stop" id="btn-stop" onclick="ttsStop()" style="display:none;">⏹️ Stop</button>
            <button class="btn-nav" onclick="ttsPrev()">⏮️</button>
            <button class="btn-nav" onclick="ttsNext()">⏭️</button>
        </div>
        
        <div class="tts-status-text" id="tts-status">Spreman. Klikni Play za početak.</div>
    </div>
    
    <script src="/static/js/reader.js?v=5"></script>
</body>
</html>
