<!DOCTYPE html>
<html lang="hr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BooklyTTS Reader</title>
    <link rel="stylesheet" href="/static/css/style.css?v=8">
    <link rel="stylesheet" href="/static/css/reader.css?v=3">
</head>
<body>
    <div class="app">
        <!-- HEADER -->
        <header class="app-header">
            <div class="header-left">
                <a href="/" class="logo">📚 BooklyTTS</a>
            </div>
            <div class="header-center" id="book-title-header">Odaberi knjigu</div>
            <div class="header-right">
                <a href="/rules" class="icon-btn" title="Pravila izgovora">🔧</a>
                <a href="/convert" class="icon-btn" title="Snimi MP3">💾</a>
                <button class="icon-btn" onclick="toggleTTS()" title="TTS kontrola">🎧</button>
            </div>
        </header>
        
        <!-- GLAVNI SADRŽAJ -->
        <div class="main-content">
            <!-- SIDEBAR -->
            <aside class="sidebar" id="sidebar">
                <div class="sidebar-header">
                    <h3>📑 Poglavlja</h3>
                    <input type="text" id="chapter-search" placeholder="🔍 Traži..." oninput="filterChapters()">
                </div>
                <div class="chapter-list" id="chapter-list">
                    <p class="empty">Uploaduj EPUB</p>
                </div>
            </aside>
            
            <!-- READER -->
            <div class="reader-view">
                <div class="reader-toolbar">
                    <button onclick="toggleSidebar()" title="Poglavlja">📑</button>
                    <select id="font-size" onchange="changeFontSize(this.value)">
                        <option value="14">14px</option>
                        <option value="16" selected>16px</option>
                        <option value="18">18px</option>
                        <option value="20">20px</option>
                        <option value="24">24px</option>
                    </select>
                    <button onclick="toggleTheme()" title="Tema">🌓</button>
                    <span id="reading-progress">0%</span>
                </div>
                
                <div class="reader-content" id="reader-content">
                    <div class="welcome-screen">
                        <h2>📚 Dobrodošli u BooklyTTS Reader</h2>
                        <p>Uploaduj EPUB fajl za početak čitanja</p>
                        <input type="file" id="epub-file" accept=".epub" style="display:none;">
                        <button class="btn btn-primary" onclick="document.getElementById('epub-file').click()">
                            📤 Upload EPUB
                        </button>
                        <p style="margin-top:12px;font-size:0.85em;">
                            <a href="/rules">🔧 Pravila izgovora</a> · 
                            <a href="/convert">💾 Snimi MP3</a>
                        </p>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- TTS PANEL -->
        <div class="tts-panel" id="tts-panel">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
                <span style="font-size:0.9em;">🎧 TTS Kontrola</span>
                <button onclick="toggleTTS()" style="background:none;border:none;color:#aaa;cursor:pointer;">✕</button>
            </div>
            <div class="tts-controls">
                <!-- ENGINE SELECTOR -->
                <select id="tts-engine" onchange="changeEngine(this.value)" style="padding:6px 10px;background:rgba(255,255,255,0.1);color:white;border:1px solid rgba(255,255,255,0.2);border-radius:6px;font-size:0.85em;">
                    <option value="edge">Microsoft Edge (besplatan, online)</option>
                    <option value="google">Google TTS (besplatan, online)</option>
                </select>
                
                <!-- VOICE SELECTOR -->
                <select id="tts-voice" style="padding:6px 10px;background:rgba(255,255,255,0.1);color:white;border:1px solid rgba(255,255,255,0.2);border-radius:6px;font-size:0.85em;">
                    <optgroup label="Hrvatski">
                        <option value="hr-HR-GabrijelaNeural" selected>Gabrijela (ž)</option>
                        <option value="hr-HR-SreckoNeural">Srecko (m)</option>
                    </optgroup>
                    <optgroup label="Bosanski">
                        <option value="bs-BA-VesnaNeural">Vesna (ž)</option>
                        <option value="bs-BA-GoranNeural">Goran (m)</option>
                    </optgroup>
                    <optgroup label="Srpski">
                        <option value="sr-RS-SophieNeural">Sophie (ž)</option>
                        <option value="sr-RS-NicholasNeural">Nicholas (m)</option>
                    </optgroup>
                </select>
                
                <!-- BRZINA -->
                <div class="rate-control">
                    <span style="font-size:0.8em;">⚡ <span id="rate-display">1.0x</span></span>
                    <input type="range" id="rate-slider" min="0.5" max="2.0" step="0.1" value="1.0" oninput="updateTTSRate(this.value)" style="width:70px;">
                </div>
                
                <!-- BG MODE -->
                <label style="font-size:0.8em;display:flex;align-items:center;gap:4px;">
                    <input type="checkbox" id="bg-mode"> 📱
                </label>
            </div>
            
            <!-- DUGMAD -->
            <div class="tts-actions">
                <button id="tts-play-btn" class="btn btn-success" onclick="ttsPlay()">▶️ Play</button>
                <button id="tts-pause-btn" class="btn" onclick="ttsPause()" style="display:none;">⏸️ Pauza</button>
                <button id="tts-stop-btn" class="btn btn-danger" onclick="ttsStop()" style="display:none;">⏹️ Stop</button>
                <button class="btn" onclick="ttsPrev()">⏮️</button>
                <button class="btn" onclick="ttsNext()">⏭️</button>
            </div>
            
            <div class="tts-status" id="tts-status">Spreman. Odaberi poglavlje i klikni Play.</div>
        </div>
    </div>
    
    <script src="/static/js/reader.js?v=2"></script>
</body>
</html>
