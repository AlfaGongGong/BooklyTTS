<!DOCTYPE html>
<html lang="hr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BooklyTTS Reader</title>
    <link rel="stylesheet" href="/static/css/style.css?v=9">
    <link rel="stylesheet" href="/static/css/reader.css?v=5">
</head>
<body>
    <div class="app">
        <header class="app-header">
            <div class="header-left">
                <a href="/" class="logo">📚 BooklyTTS</a>
            </div>
            <div class="header-center"><h1 id="book-title-header" style="font-size:1em;margin:0;">Reader</h1></div>
            <div class="header-right">
                <a href="/rules" class="icon-btn" title="Pravila">🔧</a>
                <a href="/convert" class="icon-btn" title="Konverter">💾</a>
                <button class="icon-btn" id="tts-toggle-btn" onclick="toggleTTSPanel()" title="TTS">🎧</button>
            </div>
        </header>
        
        <div class="upload-bar">
            <input type="file" id="epub-file" accept=".epub">
            <button class="btn btn-primary btn-sm" onclick="document.getElementById('epub-file').click()">📤 Upload</button>
            <span id="upload-status"></span>
        </div>
        
        <div class="main-content">
            <aside class="sidebar" id="sidebar">
                <div class="sidebar-header">
                    <h3>📑 Poglavlja</h3>
                    <input type="text" id="chapter-search" placeholder="🔍 Traži..." oninput="filterChapters()">
                </div>
                <div class="chapter-list" id="chapter-list">
                    <p class="empty">Uploaduj EPUB</p>
                </div>
            </aside>
            
            <div class="reader-view">
                <div class="reader-toolbar">
                    <button onclick="toggleSidebar()">📑</button>
                    <select id="font-size" onchange="changeFontSize(this.value)">
                        <option value="14">14px</option><option value="16" selected>16px</option>
                        <option value="18">18px</option><option value="20">20px</option><option value="24">24px</option>
                    </select>
                    <button onclick="toggleTheme()">🌓</button>
                    <span id="reading-progress">-</span>
                </div>
                <div class="reader-content" id="reader-content">
                    <div class="welcome-screen">
                        <h2>📚 BooklyTTS Reader</h2>
                        <p>Uploaduj EPUB fajl za početak čitanja</p>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- TTS PANEL -->
        <div class="tts-panel" id="tts-panel">
            <div class="tts-panel-header">
                <span>🎧 TTS Kontrola</span>
                <button class="tts-close-btn" onclick="toggleTTSPanel()">✕</button>
            </div>
            <div class="tts-panel-body">
                <div class="tts-row">
                    <select id="tts-voice">
                        <option value="hr-HR-GabrijelaNeural" selected>Gabrijela (HR ž)</option>
                        <option value="hr-HR-SreckoNeural">Srecko (HR m)</option>
                        <option value="bs-BA-VesnaNeural">Vesna (BS ž)</option>
                        <option value="bs-BA-GoranNeural">Goran (BS m)</option>
                    </select>
                    <span>⚡ <span id="rate-display">1.0x</span></span>
                    <input type="range" id="rate-slider" min="0.5" max="2.0" step="0.1" value="1.0" oninput="updateRate(this.value)">
                </div>
                <div class="tts-actions">
                    <button id="tts-play-btn" class="btn btn-success btn-sm" onclick="ttsPlay()">▶️ Play</button>
                    <button id="tts-pause-btn" class="btn btn-sm" onclick="ttsPause()" style="display:none;">⏸️ Pauza</button>
                    <button id="tts-stop-btn" class="btn btn-danger btn-sm" onclick="ttsStop()" style="display:none;">⏹️ Stop</button>
                    <button class="btn btn-sm" onclick="ttsPrev()">⏮️</button>
                    <button class="btn btn-sm" onclick="ttsNext()">⏭️</button>
                </div>
                <div class="tts-status" id="tts-status">Spreman</div>
            </div>
        </div>
    </div>
    
    <script src="/static/js/reader.js?v=4"></script>
</body>
</html>
